<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px; height: 1920px; overflow: hidden;
      background: #0B0B0C;
      display: flex; align-items: center; justify-content: center;
      font-family: "Inter Tight", system-ui, sans-serif;
    }
    .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .glow {
      position: absolute; width: 520px; height: 520px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.45) 0%, rgba(124,58,237,0.08) 45%, transparent 70%);
      animation: pulse 2.4s ease-in-out infinite;
      opacity: 0;
      animation-fill-mode: forwards;
    }
    .ring {
      position: absolute; width: 380px; height: 380px; border-radius: 50%;
      border: 1px solid rgba(196,181,253,0.25);
      animation: ringIn 1.2s cubic-bezier(.22,1,.36,1) 0.15s forwards, ringSpin 8s linear 1.2s infinite;
      opacity: 0;
    }
    .logo-wrap {
      position: relative; z-index: 2; text-align: center;
      animation: logoIn 1s cubic-bezier(.22,1,.36,1) 0.2s forwards;
      opacity: 0; transform: scale(0.88) translateY(12px);
    }
    .mark {
      font-size: 120px; font-weight: 800; letter-spacing: -0.06em;
      color: #F4F1EA; line-height: 1;
    }
    .mark span { color: #7C3AED; }
    .name {
      margin-top: 18px; font-size: 42px; font-weight: 500;
      color: #F4F1EA; letter-spacing: -0.02em;
    }
    .tag {
      margin-top: 28px; font-size: 22px; font-weight: 500;
      color: #C4B5FD; letter-spacing: 0.28em; text-transform: uppercase;
      animation: tagIn 0.8s ease 0.9s forwards;
      opacity: 0;
    }
    @keyframes pulse {
      0% { opacity: 0; transform: scale(0.6); }
      30% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.85; transform: scale(1.08); }
    }
    @keyframes ringIn {
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes ringSpin {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1); }
    }
    @keyframes logoIn {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes tagIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="ring"></div>
    <div class="logo-wrap">
      <div class="mark">R<span>.</span></div>
      <div class="name">Remake Pixel</div>
      <div class="tag">remakepix.com</div>
    </div>
  </div>
</body>
</html>
