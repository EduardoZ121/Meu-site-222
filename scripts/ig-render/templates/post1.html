<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 72px 56px 48px;
  }
  h1 {
    font-size: 52px;
    font-weight: 800;
    line-height: 1.12;
    text-align: center;
    color: #0a0a0a;
    letter-spacing: -0.03em;
    max-width: 920px;
  }
  .sub { margin-top: 16px; font-size: 22px; color: #6b7280; font-weight: 500; }
  .compare {
    margin-top: 56px;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .panel {
    width: 420px;
    height: 420px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.12);
  }
  .panel img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .arrow {
    font-size: 44px;
    color: #0a0a0a;
    font-weight: 700;
    transform: rotate(-8deg);
  }
  .foot {
    margin-top: auto;
    text-align: center;
    font-size: 18px;
    color: #9ca3af;
    font-weight: 500;
  }
  .foot strong { color: #7c3aed; font-weight: 700; }
</style>
</head>
<body>
  <h1>Turn any selfie into a studio portrait — free on Remake Pixel.</h1>
  <p class="sub">Pro Mode · 96 styles · No subscription</p>
  <div class="compare">
    <div class="panel"><img src="../../../assets/marketing/img/before.jpg" alt="Before"/></div>
    <div class="arrow">→</div>
    <div class="panel"><img src="../../../assets/marketing/img/after.jpg" alt="After"/></div>
  </div>
  <p class="foot"><strong>remakepix.com</strong> · 50 free credits to start</p>
</body>
</html>
