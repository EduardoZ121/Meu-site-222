<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remake Pixel — Anúncios Instagram</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0b0b0c;
      color: #f4f1ea;
      padding: 24px;
      max-width: 900px;
      margin-inline: auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #9ca3af; margin-bottom: 24px; }
    .grid { display: grid; gap: 20px; }
    .card {
      border: 1px solid rgba(168, 85, 247, 0.35);
      border-radius: 12px;
      overflow: hidden;
      background: #111118;
    }
    .card img { width: 100%; display: block; }
    .card .meta { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    a.dl {
      display: inline-block;
      padding: 10px 18px;
      background: #7c3aed;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    a.dl:hover { background: #9333ea; }
  </style>
</head>
<body>
  <h1>5 anúncios Instagram — Remake Pixel</h1>
  <p>1080×1350 (4:5). Toca em <strong>Descarregar JPG</strong> ou mantém premido na imagem → guardar.</p>
  <div class="grid">
    <div class="card">
      <img src="ig-ad-01-transformacao.jpg" alt="Ad 1 transformação" width="540" />
      <div class="meta"><span>1 — Transformação</span><a class="dl" href="ig-ad-01-transformacao.jpg" download>Descarregar JPG</a></div>
    </div>
    <div class="card">
      <img src="ig-ad-02-estilos.jpg" alt="Ad 2 estilos" width="540" />
      <div class="meta"><span>2 — 96 estilos</span><a class="dl" href="ig-ad-02-estilos.jpg" download>Descarregar JPG</a></div>
    </div>
    <div class="card">
      <img src="ig-ad-03-creditos.jpg" alt="Ad 3 créditos" width="540" />
      <div class="meta"><span>3 — Pacotes de créditos</span><a class="dl" href="ig-ad-03-creditos.jpg" download>Descarregar JPG</a></div>
    </div>
    <div class="card">
      <img src="ig-ad-04-estudio.jpg" alt="Ad 4 estúdio" width="540" />
      <div class="meta"><span>4 — Estúdio IA</span><a class="dl" href="ig-ad-04-estudio.jpg" download>Descarregar JPG</a></div>
    </div>
    <div class="card">
      <img src="ig-ad-05-video-poster.jpg" alt="Ad 5 vídeo pôsteres" width="540" />
      <div class="meta"><span>5 — Vídeo + pôsteres</span><a class="dl" href="ig-ad-05-video-poster.jpg" download>Descarregar JPG</a></div>
    </div>
  </div>
</body>
</html>
